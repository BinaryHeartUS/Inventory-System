server {
    listen 80;

    # Serve the built React app
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # The service worker and manifest must always be revalidated so app updates
    # reach installed clients promptly (never serve a stale shell controller).
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # nginx's default mime.types has no mapping for .webmanifest, so it would be
    # served as application/octet-stream — which iOS Safari rejects, breaking PWA
    # install. Set the correct type here (scoped so global mime.types are kept).
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # index.html is the app-shell entry point — never cache it so new hashed
    # bundle references are picked up on the next visit.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # Proxy API calls to the Java backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
