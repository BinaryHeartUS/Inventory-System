# Flyway static configuration (baked into the migrate image).
#
# The JDBC connection is supplied at runtime via env vars on the db-migrate
# service: FLYWAY_URL / FLYWAY_USER / FLYWAY_PASSWORD. The set of folders to scan
# is supplied per environment via FLYWAY_LOCATIONS (see deploy/<env>.env), so it
# is intentionally not set here.

flyway.schemas=public

# Do not auto-baseline: existing dev/prod DBs are baselined once, by hand, before
# the first Flyway deploy (see flyway_migration.md §5). A brand-new empty DB has
# no history and simply runs every migration from scratch.
flyway.baselineOnMigrate=false

# Fail if a previously-applied migration's checksum no longer matches its file.
flyway.validateOnMigrate=true

# Repeatables re-run only when their own checksum changes; versioned migrations
# must be applied in version order.
flyway.outOfOrder=false

# Do not treat *pending* migrations as a validation failure. The plan stage runs
# `flyway validate` precisely when there may be pending work (a new V migration
# or a changed repeatable), so pending must not fail it — but real problems
# (checksum drift on an applied migration, a migration missing from the repo, or
# a previously-failed one) still do.
flyway.ignoreMigrationPatterns=*:pending

# Hard safety net: never allow `flyway clean` (which drops everything) to run.
flyway.cleanDisabled=true
