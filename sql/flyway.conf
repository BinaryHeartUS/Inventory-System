# Flyway static configuration (baked into the migrate image).
#
# The JDBC connection is supplied at runtime via env vars on the db-migrate
# service: FLYWAY_URL / FLYWAY_USER / FLYWAY_PASSWORD. The set of folders to scan
# is supplied per environment via FLYWAY_LOCATIONS (see deploy/<env>.env), so it
# is intentionally not set here.

flyway.schemas=public

flyway.validateOnMigrate=true

flyway.outOfOrder=false

# Fallback validation leniency. This is overridden at runtime by the
# FLYWAY_IGNORE_MIGRATION_PATTERNS env var on the db-migrate service (prod uses
# the compose default `*:pending`; dev widens it in deploy/dev.env to also
# tolerate repeatable migrations left by other branches in the shared dev DB).
flyway.ignoreMigrationPatterns=*:pending

flyway.cleanDisabled=true
