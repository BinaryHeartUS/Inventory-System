services:
  db:
    build:
      context: ./sql
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: binaryheart
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U binaryheart -d inventory -c 'SELECT 1 FROM Volunteer LIMIT 1' -q --no-align --tuples-only 2>/dev/null | grep -q 1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  importer:
    build:
      context: .
      dockerfile: backend/import/Dockerfile
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/inventory
      DB_USER: importer
      DB_PASSWORD: changeme_importer
      IMPORT_FILE_PATH: /data/OldInventorySystem.xlsx

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/inventory
      DB_USER: api_user
      DB_PASSWORD: changeme_api_user
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
