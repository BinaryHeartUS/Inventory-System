services:
  db:
    build:
      context: ./sql
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: binaryheart
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binaryheart -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  importer:
    build:
      context: ./backend
      dockerfile: import/Dockerfile
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/inventory
      DB_USER: importer
      DB_PASSWORD: changeme_importer
      IMPORT_FILE_PATH: /data/OldInventorySystem.xlsx
    volumes:
      - ./data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/inventory
      DB_USER: binaryheart
      DB_PASSWORD: changeme
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:8080
    ports:
      - "5173:5173"

volumes:
  postgres_data:
