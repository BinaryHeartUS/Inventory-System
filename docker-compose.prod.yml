services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: binaryheart
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /opt/inventory-system/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binaryheart -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-migrate:
    build:
      context: ./sql
      dockerfile: Dockerfile.migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: binaryheart
      DB_PASSWORD: ${DB_PASSWORD}
      API_USER_PASSWORD: ${API_USER_PASSWORD}
      IMPORTER_PASSWORD: ${IMPORTER_PASSWORD}

  importer:
    build:
      context: .
      dockerfile: backend/import/Dockerfile
    restart: "no"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://db:5432/inventory
      DB_USER: importer
      DB_PASSWORD: ${IMPORTER_PASSWORD}
      IMPORT_FILE_PATH: /data/OldInventorySystem.xlsx

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://db:5432/inventory
      DB_USER: api_user
      DB_PASSWORD: ${API_USER_PASSWORD}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - frontend

volumes:
  # postgres_data volume replaced by bind mount at /opt/inventory-system/pgdata
  caddy_data:
  caddy_config:
