name: Sync Secrets

# Render secrets/<env>.env on the server from GitHub Environment secrets, so the
# per-environment secret file is managed from GitHub instead of hand-edited over
# SSH. GitHub is the source of truth; rotation = update the Environment secret,
# then run this workflow.
#
# The four values below must exist as secrets on BOTH the `development` and
# `production` GitHub Environments (Settings -> Environments -> <env> -> Secrets):
#   DB_PASSWORD, API_USER_PASSWORD, IMPORTER_PASSWORD, JWT_SECRET
#
# Syncing prod runs under the `production` environment, so it is subject to the
# same reviewer/branch protection as a prod deploy.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment's secrets to write on the server."
        type: choice
        options:
          - dev
          - prod
        required: true

permissions:
  contents: read

jobs:
  sync:
    name: Sync ${{ inputs.environment }} secrets
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || 'development' }}
    steps:
      - name: Write secrets/<env>.env over SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_USER_PASSWORD: ${{ secrets.API_USER_PASSWORD }}
          IMPORTER_PASSWORD: ${{ secrets.IMPORTER_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DEPLOY_ENV,DB_PASSWORD,API_USER_PASSWORD,IMPORTER_PASSWORD,JWT_SECRET
          script: |
            set -euo pipefail
            cd /opt/inventory-system

            # Fail early if any Environment secret is missing/empty.
            missing=""
            for var in DB_PASSWORD API_USER_PASSWORD IMPORTER_PASSWORD JWT_SECRET; do
              if [ -z "${!var:-}" ]; then
                missing="$missing $var"
              fi
            done
            if [ -n "$missing" ]; then
              echo "ERROR: missing Environment secret(s):$missing"
              echo "Set them under Settings -> Environments -> <env> -> Secrets."
              exit 1
            fi

            mkdir -p secrets
            umask 077
            target="secrets/${DEPLOY_ENV}.env"
            tmp="$(mktemp)"
            {
              printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD"
              printf 'API_USER_PASSWORD=%s\n' "$API_USER_PASSWORD"
              printf 'IMPORTER_PASSWORD=%s\n' "$IMPORTER_PASSWORD"
              printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            } > "$tmp"
            mv "$tmp" "$target"
            chmod 600 "$target"
            echo "Wrote $target ($(wc -l < "$target") keys)."
