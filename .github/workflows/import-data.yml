name: Import Data

# Manual, one-shot data import into a chosen environment. Pick the branch to run
# from in the "Run workflow" dialog (the importer image, including the data/
# files, is built from that branch's commit). Choose which environment's database
# to import into and which file in data/ to load.
#
# Importing into prod is gated by the "production" GitHub Environment (add
# required reviewers so it pauses for approval).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment whose database to import into."
        type: choice
        options:
          - dev
          - prod
        required: true
      data_file:
        description: "File in data/ to import (baked into the importer image)."
        type: string
        default: OldInventorySystem.xlsx
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push importer image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute registry prefix
        run: echo "REGISTRY=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push importer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/import/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/importer:${{ github.sha }}
          cache-from: type=gha,scope=importer
          cache-to: type=gha,mode=max,scope=importer

  import:
    name: Import into ${{ inputs.environment }}
    needs: build
    runs-on: ubuntu-latest
    # Importing into prod requires approval via the "production" environment.
    environment: ${{ inputs.environment == 'prod' && 'production' || 'development' }}
    steps:
      - name: Run importer over SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          IMAGE_TAG: ${{ github.sha }}
          DATA_FILE: ${{ inputs.data_file }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DEPLOY_ENV,IMAGE_TAG,DATA_FILE,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/inventory-system
            git fetch --all --prune
            git checkout --force "$IMAGE_TAG"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            ./scripts/import-data.sh "$DEPLOY_ENV" "$IMAGE_TAG" "$DATA_FILE"
